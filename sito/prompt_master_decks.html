<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Master - App di Gioco</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@400;600;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* --- DESIGN TOKENS --- */
        :root {
            --bg-deep: #050811;
            --bg-card: #0b1120;
            --bg-card-hover: #121b30;
            --border-color: #1e2d4a;
            
            --neon-cyan: #00F0FF;
            --neon-cyan-glow: rgba(0, 240, 255, 0.4);
            
            --neon-purple: #BD00FF;
            --neon-purple-glow: rgba(189, 0, 255, 0.4);
            
            --neon-orange: #FF9900;
            --neon-orange-glow: rgba(255, 153, 0, 0.4);

            --text-main: #94A3B8;
            --text-light: #E2E8F0;
            --text-bright: #FFFFFF;
        }

        /* --- GLOBAL --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-deep);
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.01) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.01) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding-bottom: 60px;
            overflow-x: hidden;
        }

        header {
            background-color: rgba(11, 17, 32, 0.9);
            border-bottom: 2px solid var(--neon-cyan);
            box-shadow: 0 4px 20px var(--neon-cyan-glow);
            padding: 20px 40px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(8px);
        }

        .header-container {
            align-items: center;
            display: flex;
            justify-content: space-between;
            margin: 0 auto;
            max-width: 1400px;
        }

        .logo-area h1 {
            color: var(--neon-cyan);
            font-family: 'Rajdhani', sans-serif;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 3px;
            text-shadow: 0 0 10px var(--neon-cyan-glow);
        }

        .logo-area p {
            font-family: 'Fira Code', monospace;
            font-size: 11px;
            color: var(--neon-purple);
            letter-spacing: 1px;
        }

        /* --- BUTTONS --- */
        .nav-controls {
            display: flex;
            gap: 15px;
        }

        .cyber-btn {
            background: transparent;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            cursor: pointer;
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1px;
            padding: 10px 20px;
            position: relative;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .cyber-btn::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--neon-cyan);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: -1;
        }

        .cyber-btn:hover {
            box-shadow: 0 0 15px var(--neon-cyan-glow);
            color: var(--bg-deep);
            text-shadow: none;
        }

        .cyber-btn:hover::before {
            opacity: 1;
        }

        .cyber-btn.purple {
            border-color: var(--neon-purple);
            color: var(--neon-purple);
        }

        .cyber-btn.purple::before {
            background: var(--neon-purple);
        }

        .cyber-btn.purple:hover {
            box-shadow: 0 0 15px var(--neon-purple-glow);
            color: var(--text-bright);
        }

        .cyber-btn.orange {
            border-color: var(--neon-orange);
            color: var(--neon-orange);
        }

        .cyber-btn.orange::before {
            background: var(--neon-orange);
        }

        .cyber-btn.orange:hover {
            box-shadow: 0 0 15px var(--neon-orange-glow);
            color: var(--bg-deep);
        }

        .cyber-btn.active {
            background: var(--neon-cyan);
            color: var(--bg-deep);
            box-shadow: 0 0 15px var(--neon-cyan-glow);
        }
        .cyber-btn.purple.active {
            background: var(--neon-purple);
            color: var(--text-bright);
            box-shadow: 0 0 15px var(--neon-purple-glow);
        }

        /* --- DASHBOARD --- */
        .dashboard {
            display: flex;
            flex-direction: column;
            gap: 30px;
            margin: 30px auto;
            max-width: 1400px;
            padding: 0 20px;
        }

        /* --- CHALLENGE STATION --- */
        .challenge-board {
            background-color: rgba(11, 17, 32, 0.7);
            border: 1px dashed var(--border-color);
            border-radius: 8px;
            padding: 30px;
            position: relative;
            text-align: center;
        }

        .challenge-board::before {
            content: '💻 AI_CHALLENGE_GENERATOR';
            font-family: 'Fira Code', monospace;
            font-size: 12px;
            color: var(--text-main);
            position: absolute;
            top: -10px;
            left: 20px;
            background-color: var(--bg-deep);
            padding: 0 10px;
        }

        .challenge-slots {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 25px;
            margin-bottom: 25px;
        }

        .empty-slot {
            align-items: center;
            border: 1px dashed var(--border-color);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            height: 250px;
            justify-content: center;
            color: var(--border-color);
        }

        .empty-slot i {
            font-size: 48px;
            margin-bottom: 15px;
        }

        /* --- FILTER BAR --- */
        .filter-section {
            align-items: center;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: space-between;
            padding: 20px;
        }

        .deck-info {
            font-family: 'Fira Code', monospace;
            display: flex;
            gap: 15px;
        }

        .deck-info span {
            color: var(--neon-cyan);
            font-weight: bold;
        }

        .filter-group {
            display: flex;
            gap: 10px;
        }

        /* --- CARDS --- */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .cyber-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            height: 380px;
            justify-content: space-between;
            padding: 25px;
            position: relative;
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
            overflow: hidden;
        }

        .cyber-card:hover {
            transform: translateY(-5px);
            background-color: var(--bg-card-hover);
        }

        /* Colors */
        .cyber-card.topic { border-top: 4px solid var(--neon-cyan); }
        .cyber-card.topic:hover { box-shadow: 0 5px 20px rgba(0, 240, 255, 0.15); border-color: var(--neon-cyan); }
        
        .cyber-card.context { border-top: 4px solid var(--neon-purple); }
        .cyber-card.context:hover { box-shadow: 0 5px 20px rgba(189, 0, 255, 0.15); border-color: var(--neon-purple); }
        
        .cyber-card.malus { border-top: 4px solid var(--neon-orange); }
        .cyber-card.malus:hover { box-shadow: 0 5px 20px rgba(255, 153, 0, 0.15); border-color: var(--neon-orange); }

        .card-header {
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            font-family: 'Fira Code', monospace;
            font-size: 11px;
            justify-content: space-between;
            padding-bottom: 12px;
        }

        .card-type-tag { font-weight: 600; letter-spacing: 1px; }
        .topic .card-type-tag { color: var(--neon-cyan); }
        .context .card-type-tag { color: var(--neon-purple); }
        .malus .card-type-tag { color: var(--neon-orange); }

        .card-id { color: var(--text-main); opacity: 0.7; }

        .card-body {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: center;
            margin: 20px 0;
        }

        .card-title {
            color: var(--text-bright);
            font-family: 'Rajdhani', sans-serif;
            font-size: 24px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .card-desc {
            color: var(--text-main);
            font-size: 16px; /* Ingrandito leggermente per leggibilità */
            line-height: 1.5;
        }

        .card-footer {
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            font-family: 'Fira Code', monospace;
            font-size: 10px;
            justify-content: space-between;
            padding-top: 12px;
            color: var(--text-main);
            opacity: 0.5;
        }

        .neon-text-cyan { color: var(--neon-cyan); text-shadow: 0 0 5px var(--neon-cyan-glow); }
        .neon-text-purple { color: var(--neon-purple); text-shadow: 0 0 5px var(--neon-purple-glow); }
        .neon-text-orange { color: var(--neon-orange); text-shadow: 0 0 5px var(--neon-orange-glow); }

        /* --- PRINT --- */
        @media print {
            body { background: white !important; color: black !important; padding: 0 !important; }
            header, .challenge-board, .filter-section, .nav-controls, .card-footer i { display: none !important; }
            .dashboard { max-width: 100% !important; padding: 0 !important; margin: 0 !important; }
            .cards-grid { display: grid !important; grid-template-columns: repeat(3, 1fr) !important; gap: 15px !important; page-break-inside: avoid; }
            .cyber-card { background: white !important; border: 2px solid #000 !important; color: black !important; height: 280px !important; page-break-inside: avoid !important; box-shadow: none !important; transform: none !important; }
            .card-title { color: black !important; font-size: 18px !important;}
            .card-desc { color: #333 !important; font-size: 12px !important;}
            .topic { border-top: 15px solid #000 !important; }
            .context { border-top: 15px solid #666 !important; }
            .malus { border-top: 15px solid #ccc !important; }
        }

        /* --- MOBILE RESPONSIVE --- */
        @media (max-width: 768px) {
            header { padding: 15px 20px; }
            .logo-area h1 { font-size: 24px; }
            .nav-controls { display: none; /* Nascondi pulsante stampa su mobile */ }
            .filter-section { flex-direction: column; align-items: stretch; }
            .filter-group { flex-wrap: wrap; }
            .filter-group button { flex-grow: 1; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <div class="logo-area">
                <h1>PROMPT MASTER</h1>
                <p>> DATABASE_115_CARTE_ATTIVO</p>
            </div>
            <div class="nav-controls">
                <button class="cyber-btn orange" onclick="window.print()">
                    <i class="fa-solid fa-print"></i> Stampa Mazzo (A4)
                </button>
            </div>
        </div>
    </header>

    <div class="dashboard">
        
        <section class="challenge-board">
            <div class="nav-controls" style="justify-content: center; margin-bottom: 20px;">
                <button class="cyber-btn orange" onclick="generateChallenge()" style="font-size: 18px; padding: 12px 30px;">
                    <i class="fa-solid fa-bolt"></i> Estrai Sfida Casuale
                </button>
            </div>
            
            <div class="challenge-slots" id="challenge-slots">
                <div class="empty-slot">
                    <i class="fa-solid fa-crosshairs neon-text-cyan"></i>
                    <p>Mazzo Topic (45)</p>
                </div>
                <div class="empty-slot">
                    <i class="fa-solid fa-masks-theater neon-text-purple"></i>
                    <p>Mazzo Contesto (35)</p>
                </div>
                <div class="empty-slot">
                    <i class="fa-solid fa-triangle-exclamation neon-text-orange"></i>
                    <p>Mazzo Malus (35)</p>
                </div>
            </div>
        </section>

        <section class="filter-section">
            <div class="deck-info">
                <span><span id="deck-count">115</span> Carte Totali</span>
                <span>(<span id="topic-count" style="color:var(--text-main)">45</span> Topic, <span id="context-count" style="color:var(--text-main)">35</span> Contesto, <span id="malus-count" style="color:var(--text-main)">35</span> Malus)</span>
            </div>
            <div class="filter-group">
                <button class="cyber-btn active" id="filter-all" onclick="filterCards('all')">Tutte</button>
                <button class="cyber-btn" id="filter-topic" onclick="filterCards('topic')">Solo Topic</button>
                <button class="cyber-btn purple" id="filter-context" onclick="filterCards('context')">Solo Contesto</button>
                <button class="cyber-btn orange" id="filter-malus" onclick="filterCards('malus')">Solo Malus</button>
            </div>
        </section>

        <main class="cards-grid" id="cards-grid">
            <!-- Le carte verranno inserite qui dal JS -->
        </main>

    </div>

        let currentFilter = 'all';

        // Inizializza
        window.onload = function() {
            renderDeck();
        };

        // Filtra
        function filterCards(type) {
            currentFilter = type;
            
            // UI Bottoni
            ['all', 'topic', 'context', 'malus'].forEach(b => {
                document.getElementById(`filter-${b}`).classList.remove('active');
            });
            document.getElementById(`filter-${type}`).classList.add('active');

            renderDeck();
        }

        // Mostra le carte
        function renderDeck() {
            const grid = document.getElementById('cards-grid');
            grid.innerHTML = '';
            
            const cards = mainDeck.filter(card => {
                return currentFilter === 'all' || card.type === currentFilter;
            });

            cards.forEach(card => {
                const cardEl = document.createElement('div');
                cardEl.className = `cyber-card ${card.type}`;
                
                let icon = 'fa-crosshairs';
                let typeLabel = 'TOPIC';
                if (card.type === 'context') { icon = 'fa-masks-theater'; typeLabel = 'CONTESTO'; } 
                else if (card.type === 'malus') { icon = 'fa-triangle-exclamation'; typeLabel = 'MALUS'; }

                cardEl.innerHTML = `
                    <div class="card-header">
                        <span class="card-type-tag"><i class="fa-solid ${icon}"></i> ${typeLabel}</span>
                        <span class="card-id">${card.id}</span>
                    </div>
                    <div class="card-body">
                        <h3 class="card-title">${card.title}</h3>
                        <p class="card-desc">${card.desc}</p>
                    </div>
                    <div class="card-footer">
                        <span>PRONTO ALL'USO</span>
                    </div>
                `;
                grid.appendChild(cardEl);
            });
        }

        // Genera Sfida Casuale (1 Topic, 1 Contesto, 1 Malus)
        function generateChallenge() {
            const topics = mainDeck.filter(c => c.type === 'topic');
            const contexts = mainDeck.filter(c => c.type === 'context');
            const malus = mainDeck.filter(c => c.type === 'malus');

            const randomTopic = topics[Math.floor(Math.random() * topics.length)];
            const randomContext = contexts[Math.floor(Math.random() * contexts.length)];
            const randomMalus = malus[Math.floor(Math.random() * malus.length)];

            const slotArea = document.getElementById('challenge-slots');
            slotArea.innerHTML = '';

            const selected = [
                { card: randomTopic, typeLabel: 'TOPIC // OBIETTIVO', icon: 'fa-crosshairs' },
                { card: randomContext, typeLabel: 'CONTESTO // TONO', icon: 'fa-masks-theater' },
                { card: randomMalus, typeLabel: 'MALUS // VINCOLO', icon: 'fa-triangle-exclamation' }
            ];

            selected.forEach(item => {
                const cardEl = document.createElement('div');
                cardEl.className = `cyber-card ${item.card.type}`;
                cardEl.style.height = 'auto'; // Si adatta al testo nella riga sfida
                cardEl.style.minHeight = '280px';
                cardEl.innerHTML = `
                    <div class="card-header">
                        <span class="card-type-tag"><i class="fa-solid ${item.icon}"></i> ${item.typeLabel}</span>
                        <span class="card-id">${item.card.id}</span>
                    </div>
                    <div class="card-body">
                        <h3 class="card-title">${item.card.title}</h3>
                        <p class="card-desc">${item.card.desc}</p>
                    </div>
                    <div class="card-footer">
                        <span style="color: #00F0FF; font-weight: bold;">[ SFIDA ATTIVA ]</span>
                    </div>
                `;
                slotArea.appendChild(cardEl);
            });
        }
    </script>
